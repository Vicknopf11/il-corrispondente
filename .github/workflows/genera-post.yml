name: Genera Post Satirici

on:
  schedule:
    - cron: '17 7 * * *'   # 09:17 ora italiana (UTC+2)
  workflow_dispatch:        # consente esecuzione manuale

jobs:
  genera:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install anthropic requests requests-oauthlib

      - name: Genera post e coda tweet
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python genera.py

      - name: Commit e push
        run: |
          git config user.name "Il Corrispondente Bot"
          git config user.email "bot@il-corrispondente"
          git add docs/posts.json docs/feed.xml coda_x.json
          git diff --staged --quiet || git commit -m "Edizione del $(date +'%Y-%m-%d')"
          git push