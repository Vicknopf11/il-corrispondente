name: Genera Post Satirici

on:
  schedule:
    - cron: '0 7 * * *'   # 09:00 ora italiana (UTC+2)
  workflow_dispatch:        # consente esecuzione manuale

jobs:
  genera:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install anthropic requests requests-oauthlib

      - name: Genera e pubblica post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Le 4 variabili X sono opzionali — se non presenti, non pubblica su X
          PUBBLICA_SU_X: ${{ secrets.X_API_KEY != '' && 'true' || 'false' }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python genera.py

      - name: Commit e push
        run: |
          git config user.name "Il Corrispondente Bot"
          git config user.email "bot@il-corrispondente"
          git add docs/posts.json
          git diff --staged --quiet || git commit -m "Edizione del $(date +'%Y-%m-%d')"
          git push
