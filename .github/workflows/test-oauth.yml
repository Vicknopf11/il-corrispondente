name: Test Diagnostico OAuth1
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installa dipendenze
        run: pip install requests requests-oauthlib
      - name: Test A - users/me con nuovo hostname
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          python3 << 'EOF'
          import os
          from requests_oauthlib import OAuth1Session

          oauth = OAuth1Session(
              os.environ["X_API_KEY"],
              client_secret=os.environ["X_API_SECRET"],
              resource_owner_key=os.environ["X_ACCESS_TOKEN"],
              resource_owner_secret=os.environ["X_ACCESS_SECRET"],
          )

          print("=== TEST A: GET /2/users/me ===")
          r1 = oauth.get("https://api.x.com/2/users/me")
          print(f"Status: {r1.status_code}")
          print(f"Body: {r1.text}")

          print()
          print("=== TEST B: POST /2/tweets su api.x.com ===")
          r2 = oauth.post(
              "https://api.x.com/2/tweets",
              json={"text": "Test diagnostico API X hostname OAuth1 2026 - ignorare"},
          )
          print(f"Status: {r2.status_code}")
          print(f"Body: {r2.text}")
          EOF
