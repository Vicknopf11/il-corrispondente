name: Test Diagnostico OAuth1
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installa dipendenze
        run: pip install requests requests-oauthlib
      - name: Test C - stesso pattern di pubblica_tweet.py (classe OAuth1)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          python3 << 'EOF'
          import os
          import requests
          from requests_oauthlib import OAuth1

          auth = OAuth1(
              os.environ["X_API_KEY"],
              os.environ["X_API_SECRET"],
              os.environ["X_ACCESS_TOKEN"],
              os.environ["X_ACCESS_SECRET"],
          )

          print("=== TEST C: POST /2/tweets con classe OAuth1 (come pubblica_tweet.py) ===")
          r = requests.post(
              "https://api.x.com/2/tweets",
              auth=auth,
              json={"text": "Test diagnostico C - classe OAuth1 - ignorare"},
              timeout=10,
          )
          print(f"Status: {r.status_code}")
          print(f"Body: {r.text}")
          print(f"Request headers inviati: {dict(r.request.headers)}")
          EOF
