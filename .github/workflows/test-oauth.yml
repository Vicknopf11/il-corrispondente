name: Test Diagnostico OAuth1
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installa dipendenze
        run: pip install requests requests-oauthlib
      - name: Test D - testo reale del tweet in coda (Poste/TIM)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          python3 << 'PYEOF'
          import os
          import json
          import requests
          from requests_oauthlib import OAuth1

          auth = OAuth1(
              os.environ["X_API_KEY"],
              os.environ["X_API_SECRET"],
              os.environ["X_ACCESS_TOKEN"],
              os.environ["X_ACCESS_SECRET"],
          )

          testo = "Poste (Stato) compra TIM (già Stato, privatizzata nel '97, sfilettata da KKR nel 2024). Trent'anni di mercato, per poi rientrare dalla finestra a 10,8 miliardi. I piccoli azionisti di TIM: 'Il premio è del 9%'. Goldman Sachs e Evercore: 'Tutto congruo'. Coincidenze. #TIM #Poste #OPAS"

          print(f"Lunghezza testo: {len(testo)} caratteri")
          print(f"Testo (repr): {testo!r}")
          print()

          print("=== TEST D: POST /2/tweets con testo reale dalla coda ===")
          r = requests.post(
              "https://api.x.com/2/tweets",
              auth=auth,
              json={"text": testo},
              timeout=10,
          )
          print(f"Status: {r.status_code}")
          print(f"Body: {r.text}")
          PYEOF
